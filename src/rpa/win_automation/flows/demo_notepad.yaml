name: "记事本自动化 — 写入并保存"
description: "启动记事本 → 输入文本 → 保存文件 → 关闭"
variables:
  content: "RPADataHub WinAuto 测试\n====================\n时间: {{timestamp}}\n状态: 自动化成功!"
  output_file: "rpa_notepad_demo.txt"

steps:
  - open_app:
      path: "notepad.exe"
      backend: "uia"
      connect_title: ".*记事本|.*Notepad"
      timeout: 10
    _name: "启动记事本"

  - wait:
      seconds: 1
    _name: "等待窗口就绪"

  - input:
      value: "{{content}}"
      target: "Edit"
      timeout: 5
    _name: "输入文本内容"

  - wait:
      seconds: 0.5
    _name: "等待输入完成"

  - send_keys:
      keys: "^s"
      pause: 0.05
    _name: "Ctrl+S 保存"

  - wait:
      seconds: 1
    _name: "等待保存对话框"

  - input:
      value: "{{output_file}}"
      target: "Edit"
      timeout: 5
    _name: "输入文件名"

  - click:
      name: "保存"
      control_type: "Button"
      timeout: 5
    _name: "点击保存按钮"

  - wait:
      seconds: 0.5
    _name: "等待保存完成"

  - close_app:
    _name: "关闭记事本"

  - print:
      message: "记事本自动化流程完成!"
    _name: "输出日志"