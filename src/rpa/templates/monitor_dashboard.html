{% extends "base.html" %}
{% block title %}采集监控 - RPA Admin{% endblock %}
{% block extra_head %}
<script src="/static/chart.umd.js"></script>
{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-graph-up"></i> 采集监控</h4>
    <div class="d-flex gap-2">
        <select class="form-select form-select-sm" style="width:200px" id="tableSelect" onchange="loadCharts()">
            {% for t in tables %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
        </select>
        <select class="form-select form-select-sm" style="width:120px" id="daysSelect" onchange="loadCharts()">
            <option value="7">近7天</option><option value="14">近14天</option><option value="30" selected>近30天</option><option value="60">近60天</option>
        </select>
    </div>
</div>

<!-- 统计卡片 -->
<div class="row mb-3">
    <div class="col-md-3">
        <div class="card stat-card" style="border-left-color:#3b82f6">
            <div class="card-body"><div class="text-muted small">今日采集量</div><h3 id="statToday" class="mb-0">-</h3></div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card" style="border-left-color:#ef4444">
            <div class="card-body"><div class="text-muted small">今日拦截量</div><h3 id="statDirty" class="mb-0 text-danger">-</h3></div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card" style="border-left-color:#f59e0b">
            <div class="card-body"><div class="text-muted small">累计拦截</div><h3 id="statTotalDirty" class="mb-0">-</h3></div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card" style="border-left-color:#22c55e">
            <div class="card-body"><div class="text-muted small">近7天成功率</div><h3 id="statRate" class="mb-0 text-success">-</h3></div>
        </div>
    </div>
</div>

<!-- 图表 -->
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header fw-bold"><i class="bi bi-bar-chart-fill"></i> 采集量趋势</div>
            <div class="card-body" style="height:240px"><canvas id="collectChart"></canvas></div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header fw-bold"><i class="bi bi-exclamation-triangle-fill text-danger"></i> 拦截量趋势</div>
            <div class="card-body" style="height:240px"><canvas id="dirtyChart"></canvas></div>
        </div>
    </div>
</div>

{% endblock %}
{% block extra_scripts %}
<script>
let collectChart, dirtyChart;

function loadCharts() {
    const table = document.getElementById('tableSelect').value;
    const days = document.getElementById('daysSelect').value;

    fetch('/api/monitor/chart_data?table='+encodeURIComponent(table)+'&days='+days)
        .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
        .then(d => {
            // 统计
            document.getElementById('statToday').textContent = d.stats.today_collect.toLocaleString();
            document.getElementById('statDirty').textContent = d.stats.today_dirty.toLocaleString();
            document.getElementById('statTotalDirty').textContent = d.stats.total_dirty.toLocaleString();
            document.getElementById('statRate').textContent = (d.stats.success_rate || 0) + '%';

            // 采集量图
            const labels = d.collect.map(x => x.dt);
            const values = d.collect.map(x => x.cnt);

            if (collectChart) collectChart.destroy();
            collectChart = new Chart(document.getElementById('collectChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '采集量',
                        data: values,
                        backgroundColor: 'rgba(59,130,246,0.5)',
                        borderColor: '#3b82f6',
                        borderWidth: 1,
                        borderRadius: 3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { precision: 0 } },
                        x: { ticks: { maxTicksLimit: 15, font: { size: 10 } } }
                    }
                }
            });

            // 拦截量图
            const dlabels = d.dirty.map(x => x.dt);
            const dvalues = d.dirty.map(x => x.cnt);

            if (dirtyChart) dirtyChart.destroy();
            dirtyChart = new Chart(document.getElementById('dirtyChart'), {
                type: 'bar',
                data: {
                    labels: dlabels,
                    datasets: [{
                        label: '拦截量',
                        data: dvalues,
                        backgroundColor: 'rgba(239,68,68,0.5)',
                        borderColor: '#ef4444',
                        borderWidth: 1,
                        borderRadius: 3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { precision: 0 } },
                        x: { ticks: { maxTicksLimit: 15, font: { size: 10 } } }
                    }
                }
            });
        })
        .catch(err => {
            document.getElementById('statToday').textContent = 'ERR';
            document.getElementById('statDirty').textContent = 'ERR';
            document.getElementById('statTotalDirty').textContent = 'ERR';
            document.getElementById('statRate').textContent = 'ERR';
        });
}

loadCharts();
</script>
{% endblock %}
