{% extends "base.html" %}
{% block title %}店铺管理 - RPA Admin{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-shop"></i> 店铺管理</h4>
    <div>
        <button class="btn btn-outline-secondary btn-sm me-2" onclick="loadShops()"><i class="bi bi-arrow-clockwise"></i></button>
        <button class="btn btn-outline-success btn-sm me-2" onclick="exportShops()">
            <i class="bi bi-download"></i> 导出Excel
        </button>
        <button class="btn btn-dark btn-sm" onclick="showEdit()">
            <i class="bi bi-plus-lg"></i> 新增店铺
        </button>
    </div>
</div>

<!-- 筛选 -->
<div class="card mb-3">
    <div class="card-body py-2">
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" class="form-control form-control-sm" id="fSearch" placeholder="搜索店铺名称/ID" onkeydown="if(event.key==='Enter')loadShops()">
            </div>
            <div class="col-md-2">
                <select class="form-select form-select-sm" id="fPlatform" onchange="loadShops()">
                    <option value="">全部平台</option>
                </select>
            </div>
            <div class="col-md-1">
                <select class="form-select form-select-sm" id="fStatus" onchange="loadShops()">
                    <option value="">全部</option><option value="1">活跃</option><option value="0">低频</option><option value="-1">停用</option>
                </select>
            </div>
            <div class="col-md-1">
                <button class="btn btn-dark btn-sm" onclick="loadShops()">查询</button>
            </div>
        </div>
    </div>
</div>

<!-- 表格 -->
<div class="card">
    <div class="table-responsive">
        <table class="table table-sm table-hover mb-0">
            <thead class="table-light"><tr>
                <th style="cursor:pointer;user-select:none" onclick="sortShopBy('shop_id')">店铺ID <span class="sort-indicator" id="ssort_shop_id"></span></th>
                <th style="cursor:pointer;user-select:none" onclick="sortShopBy('shop_name')">店铺名称 <span class="sort-indicator" id="ssort_shop_name"></span></th>
                <th style="cursor:pointer;user-select:none" onclick="sortShopBy('platform')">平台 <span class="sort-indicator" id="ssort_platform"></span></th>
                <th style="cursor:pointer;user-select:none" onclick="sortShopBy('bu')">BU <span class="sort-indicator" id="ssort_bu"></span></th>
                <th style="cursor:pointer;user-select:none" onclick="sortShopBy('email')">邮箱 <span class="sort-indicator" id="ssort_email"></span></th>
                <th style="cursor:pointer;user-select:none" onclick="sortShopBy('status')">状态 <span class="sort-indicator" id="ssort_status"></span></th>
                <th style="cursor:pointer;user-select:none" onclick="sortShopBy('create_time')">创建时间 <span class="sort-indicator" id="ssort_create_time"></span></th>
                <th>操作</th>
            </tr></thead>
            <tbody id="shopBody">
                <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer d-flex justify-content-between" id="shopPager" style="display:none">
        <div class="d-flex align-items-center gap-2">
            <small class="text-muted" id="shopInfo"></small>
            <select class="form-select form-select-sm" style="width:auto" id="shopPageSize" onchange="loadShops(1)">
                <option value="15">15条/页</option><option value="30">30条/页</option><option value="50">50条/页</option><option value="100">100条/页</option>
            </select>
        </div>
        <div class="btn-group btn-group-sm" id="shopBtns"></div>
    </div>
</div>

<!-- 编辑 Modal -->
<div class="modal fade" id="shopModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="shopModalTitle">新增店铺</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="row g-2">
                <div class="col-6"><label class="form-label">店铺ID <span class="text-danger">*</span></label><input class="form-control" id="eShopId"></div>
                <div class="col-6"><label class="form-label">店铺名称 <span class="text-danger">*</span></label><input class="form-control" id="eShopName"></div>
                <div class="col-6"><label class="form-label">平台</label><input class="form-control" id="ePlatform" placeholder="如 Amazon"></div>
                <div class="col-6"><label class="form-label">BU</label><input class="form-control" id="eBu" placeholder="如 北美BU"></div>
                <div class="col-6"><label class="form-label">邮箱</label><input class="form-control" id="eEmail"></div>
                <div class="col-6"><label class="form-label">状态</label><select class="form-select" id="eStatus"><option value="1">活跃</option><option value="0">低频</option><option value="-1">停用</option></select></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button class="btn btn-dark" onclick="saveShop()">保存</button>
        </div>
    </div></div>
</div>

{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('rpa_data_hub.static', filename='js/shops.js') }}"></script>
{% endblock %}
<script>
let currentPage = 1, shopSortCol = '', shopSortDir = 'desc';
function sortShopBy(col) {
    if (shopSortCol === col) shopSortDir = shopSortDir === 'asc' ? 'desc' : 'asc';
    else { shopSortCol = col; shopSortDir = 'desc'; }
    document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '');
    const ind = document.getElementById('ssort_' + col);
    if (ind) ind.textContent = shopSortDir === 'asc' ? ' ▲' : ' ▼';
    loadShops(1);
}

function loadShops(page) {
    currentPage = page || currentPage;
    const perPage = document.getElementById('shopPageSize').value || 15;
    let qs = 'page='+currentPage+'&per_page='+perPage+'&sort='+shopSortCol+'&order='+shopSortDir;
    let s = document.getElementById('fSearch').value;
    let p = document.getElementById('fPlatform').value;
    let st = document.getElementById('fStatus').value;
    if(s) qs += '&search='+encodeURIComponent(s);
    if(p) qs += '&platform='+encodeURIComponent(p);
    if(st) qs += '&status='+st;

    fetch('/rpa/api/shops/data?'+qs)
        .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
        .then(d => {
            // 更新平台下拉
            let platHtml = '<option value="">全部平台</option>';
            d.platforms.forEach(p => platHtml += '<option value="'+p+'">'+p+'</option>');
            document.getElementById('fPlatform').innerHTML = platHtml;
            if(p) document.getElementById('fPlatform').value = p;

            let html = '';
            if (!d.records || d.records.length === 0) {
                html = '<tr><td colspan="8" class="text-center text-muted py-4">无匹配数据</td></tr>';
            } else {
                d.records.forEach(r => {
                    let statusBadge = r.status == 1 ? '<span class="badge bg-success">活跃</span>' :
                                      r.status == 0 ? '<span class="badge bg-warning">低频</span>' :
                                      '<span class="badge bg-secondary">停用</span>';
                    html += '<tr><td><code>'+r.shop_id+'</code></td><td>'+r.shop_name+'</td><td>'+r.platform+'</td>'
                           +'<td>'+r.bu+'</td><td>'+r.email+'</td><td>'+statusBadge+'</td><td>'+(r.create_time||'-')+'</td>'
                           +'<td><button class="btn btn-outline-secondary btn-sm" onclick="showEdit(\''+r.shop_id+'\')"><i class="bi bi-pencil"></i></button></td></tr>';
                });
            }
            document.getElementById('shopBody').innerHTML = html;

            let total = d.total || 0;
            let pages = Math.max(1, Math.ceil(total/perPage));
            document.getElementById('shopInfo').textContent = '共 '+total+' 条';
            let btns = '';
            for (let i=Math.max(1,currentPage-2); i<=Math.min(pages, currentPage+2); i++) {
                btns += '<button class="btn btn-sm '+(i===currentPage?'btn-dark':'btn-outline-secondary')+'" onclick="loadShops('+i+')">'+i+'</button>';
            }
            document.getElementById('shopBtns').innerHTML = btns;
            document.getElementById('shopPager').style.display = 'flex';
        })
        .catch(err => {
            document.getElementById('shopBody').innerHTML = '<tr><td colspan="8" class="text-center text-danger py-4">加载失败: '+err.message+'</td></tr>';
        });
}

function showEdit(shopId) {
    document.getElementById('shopModalTitle').textContent = shopId ? '编辑店铺: '+shopId : '新增店铺';
    if (shopId) {
        fetch('/rpa/api/shops/data?search='+encodeURIComponent(shopId))
            .then(r => r.json())
            .then(d => {
                let r = d.records.find(x => x.shop_id === shopId);
                if (r) {
                    document.getElementById('eShopId').value = r.shop_id;
                    document.getElementById('eShopId').readOnly = true;
                    document.getElementById('eShopName').value = r.shop_name;
                    document.getElementById('ePlatform').value = r.platform||'';
                    document.getElementById('eBu').value = r.bu||'';
                    document.getElementById('eEmail').value = r.email||'';
                    document.getElementById('eStatus').value = r.status;
                }
            });
    } else {
        document.getElementById('eShopId').value = '';
        document.getElementById('eShopId').readOnly = false;
        document.getElementById('eShopName').value = '';
        document.getElementById('ePlatform').value = '';
        document.getElementById('eBu').value = '';
        document.getElementById('eEmail').value = '';
        document.getElementById('eStatus').value = '1';
    }
    new bootstrap.Modal(document.getElementById('shopModal')).show();
}

function saveShop() {
    let data = {
        shop_id: document.getElementById('eShopId').value,
        shop_name: document.getElementById('eShopName').value,
        platform: document.getElementById('ePlatform').value,
        bu: document.getElementById('eBu').value,
        email: document.getElementById('eEmail').value,
        status: parseInt(document.getElementById('eStatus').value),
    };
    if (!data.shop_id || !data.shop_name) return showToast('店铺ID和名称不能为空', 'error');
    fetch('/rpa/api/shops/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
        .then(r => r.json())
        .then(d => {
            if (d.success) { showToast('保存成功'); document.getElementById('shopModal').querySelector('.btn-close').click(); loadShops(1); }
            else showToast(d.error, 'error');
        });
}

function exportShops() {
    let s = document.getElementById('fSearch').value;
    let p = document.getElementById('fPlatform').value;
    let st = document.getElementById('fStatus').value;
    let qs = '';
    if(s) qs += '&search='+encodeURIComponent(s);
    if(p) qs += '&platform='+p;
    if(st) qs += '&status='+st;
    window.open('/rpa/api/shops/export?'+qs, '_blank');
}

loadShops(1);
</script>
{% endblock %}
