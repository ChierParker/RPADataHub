{% extends "base.html" %}
{% block title %}店铺健康度 - RPA Admin{% endblock %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-heart-pulse"></i> 店铺采集健康度 <small class="text-muted">最近7天</small></h4>
<div class="card"><div class="card-body"><div class="table-responsive"><table class="table table-sm"><thead><tr><th>店铺</th>{% for i in range(7) %}<th class="text-center" style="width:60px">D-{{ 6-i }}</th>{% endfor %}<th>状态</th></tr></thead><tbody id="body"><tr><td colspan="9" class="text-center text-muted py-4">加载中...</td></tr></tbody></table></div></div></div>
{% endblock %}
{% block extra_scripts %}
<script>window.__HEALTH_SHOPS__=[{% for s in shops %}'{{ s }}'{% if not loop.last %},{% endif %}{% endfor %}];</script>
<script src="{{ url_for('rpa_data_hub.static', filename='js/collection_health.js') }}"></script>
{% endblock %}
