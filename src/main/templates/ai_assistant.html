{% extends "base.html" %}
{% block title %}AI智能助手 — EcomIQ-RPA{% endblock %}
{% block page_title %}🤖 AI智能助手{% endblock %}

{% block extra_head %}
<style>
    .chat-wrapper {
        max-width: 860px; margin: 0 auto;
        height: calc(100vh - 180px); display: flex;
        flex-direction: column; background: #fff;
        border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;
    }
    .chat-header {
        padding: 16px 20px; background: linear-gradient(135deg, #1e293b, #334155);
        color: #fff; font-weight: 600; font-size: 15px;
        display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .chat-header .status-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #22c55e; display: inline-block; margin-right: 6px;
        animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8fafc; }
    .chat-messages .msg {
        margin-bottom: 16px; display: flex; gap: 10px;
        animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .chat-messages .msg.user { flex-direction: row-reverse; }
    .msg .avatar {
        width: 34px; height: 34px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; flex-shrink: 0;
    }
    .msg.assistant .avatar { background: #dbeafe; color: #3b82f6; }
    .msg.user .avatar { background: #dcfce7; color: #16a34a; }
    .msg .bubble {
        max-width: 75%; padding: 10px 16px; border-radius: 12px;
        font-size: 13.5px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    }
    .msg.assistant .bubble {
        background: #fff; border: 1px solid #e2e8f0; color: #1e293b; border-top-left-radius: 4px;
    }
    .msg.user .bubble { background: #3b82f6; color: #fff; border-top-right-radius: 4px; }
    .msg .time { font-size: 10px; color: #94a3b8; margin-top: 4px; }
    .msg.user .time { text-align: right; }
    .chat-input-area {
        padding: 14px 20px; border-top: 1px solid #e2e8f0;
        background: #fff; flex-shrink: 0;
    }
    .chat-input-area .input-row { display: flex; gap: 10px; }
    .chat-input-area input {
        flex: 1; padding: 10px 16px; border: 1.5px solid #e2e8f0;
        border-radius: 10px; font-size: 13.5px; outline: none; transition: border-color 0.2s;
    }
    .chat-input-area input:focus {
        border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .chat-input-area button {
        padding: 10px 24px; background: #3b82f6; color: #fff;
        border: none; border-radius: 10px; font-size: 13.5px; font-weight: 500;
        cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .chat-input-area button:hover { background: #2563eb; }
    .chat-input-area button:disabled { background: #94a3b8; cursor: not-allowed; }
    .suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .suggestions .chip {
        padding: 5px 12px; background: #f1f5f9; border: 1px solid #e2e8f0;
        border-radius: 16px; font-size: 12px; color: #475569;
        cursor: pointer; transition: all 0.2s;
    }
    .suggestions .chip:hover { background: #dbeafe; border-color: #3b82f6; color: #2563eb; }
    .typing-indicator { display: flex; gap: 4px; padding: 10px 16px; }
    .typing-indicator span {
        width: 7px; height: 7px; border-radius: 50%; background: #94a3b8;
        animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }


{% block content %}
<div class="p-3">
    <div class="chat-wrapper">
        <div class="chat-header">
            <span><i class="bi bi-robot me-2"></i>EcomIQ AI 智能助手</span>
            <span style="font-size:11px;opacity:0.8"><span class="status-dot"></span>DeepSeek · 在线</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="msg assistant">
                <div class="avatar">🤖</div>
                <div>
                    <div class="bubble">你好！我是 EcomIQ AI 智能助手，基于 DeepSeek 大模型。
我可以帮你：
📊 数据查询 — 今日采集概览、GMV 分析、异常排查
📈 趋势分析 — 广告花费、退款排行、店铺对比
💡 智能问答 — 运营建议、故障诊断

试试下面的快捷问题，或直接输入你想了解的内容 👇</div>
                    <div class="time">刚刚</div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-row">
                <input type="text" id="chatInput" placeholder="输入问题，如：今天采集了多少数据？"
                    onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}">
                <button onclick="sendMessage()" id="sendBtn">
                    <i class="bi bi-send me-1"></i>发送
                </button>
            </div>
            <div class="suggestions">
                <span class="chip" onclick="quickAsk('今天的数据采集概览')">📊 今日概览</span>
                <span class="chip" onclick="quickAsk('最近7天有哪些异常？')">⚠️ 异常排查</span>
                <span class="chip" onclick="quickAsk('各平台近30天GMV对比')">💰 GMV 分析</span>
                <span class="chip" onclick="quickAsk('最近7天广告花费排行')">📣 广告分析</span>
                <span class="chip" onclick="quickAsk('店铺退款金额排行')">🔄 退款排行</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

    function nowTime() {
        const d = new Date();
        return d.getHours().toString().padStart(2,'0') + ':' +
               d.getMinutes().toString().padStart(2,'0');
    }

    function addMessage(role, text) {
        const isUser = role === 'user';
        const avatar = isUser ? '🙋' : '🤖';
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.innerHTML = '<div class="avatar">' + avatar + '</div>' +
            '<div><div class="bubble">' + escapeHtml(text) + '</div>' +
            '<div class="time">' + nowTime() + '</div></div>';
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function addTyping() {
        const div = document.createElement('div');
        div.className = 'msg assistant';
        div.id = 'typingMsg';
        div.innerHTML = '<div class="avatar">🤖</div>' +
            '<div><div class="bubble"><div class="typing-indicator">' +
            '<span></span><span></span><span></span></div></div></div>';
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function removeTyping() {
        const el = document.getElementById('typingMsg');
        if (el) el.remove();
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function sendMessage() {
        const msg = chatInput.value.trim();
        if (!msg) return;
        addMessage('user', msg);
        chatInput.value = '';
        chatInput.focus();
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>思考中';
        addTyping();
        try {
            const resp = await fetch('/rpa/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            const data = await resp.json();
            removeTyping();
            addMessage('assistant', data.reply || '抱歉，暂时无法响应，请稍后重试。');
        } catch (e) {
            removeTyping();
            addMessage('assistant', '❌ AI 服务暂时不可用，请检查网络连接或稍后重试。');
        }
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="bi bi-send me-1"></i>发送';
    }

    function quickAsk(question) {
        chatInput.value = question;
        sendMessage();
    }

    chatInput.focus();
</script>
{% endblock %}
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-6px); }
    }
</style>
{% endblock %}
