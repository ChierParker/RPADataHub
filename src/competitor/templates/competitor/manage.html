<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞品管理 - CompetitorWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .crawl-status-bar {
            transition: all 0.3s ease;
        }

        .platform-badge {
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"
                style="border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:4px 12px;font-size:13px;"><i
                    class="bi bi-house-door me-1"></i>首页</a>
            <span class="navbar-brand ms-3" style="font-weight:700;letter-spacing:-0.3px;"><i
                    class="bi bi-eye me-1"></i>CompetitorWatch</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="/competitor/manage">竞品管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/competitor/dashboard">竞价看板</a></li>
                    <li class="nav-item"><a class="nav-link" href="/competitor/reports">AI 报告</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <!-- 工具栏 -->
        <div class="d-flex align-items-center mb-3 gap-2 flex-wrap">
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="bi bi-plus-lg"></i> 新增竞品
            </button>
            <select id="regionFilter" class="form-select form-select-sm" style="max-width:140px"
                onchange="loadCompetitors()">
                <option value="">全部板块</option>
                <option value="international">国际</option>
                <option value="domestic">国内</option>
            </select>
            <select id="platformFilter" class="form-select form-select-sm" style="max-width:130px"
                onchange="loadCompetitors()">
                <option value="">全部平台</option>
                <option value="amazon">Amazon</option>
                <option value="walmart">Walmart</option>
                <option value="shopee">Shopee</option>
                <option value="taobao">淘宝</option>
                <option value="jd">京东</option>
                <option value="pdd">拼多多</option>
            </select>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadCompetitors()">
                <i class="bi bi-arrow-repeat"></i> 刷新
            </button>
            <!-- 无头模式开关 -->
            <div class="form-check form-switch ms-2">
                <input class="form-check-input" type="checkbox" id="headlessSwitch" checked>
                <label class="form-check-label small text-muted" for="headlessSwitch">无头模式</label>
            </div>
            <span id="statusBadge" class="badge bg-success ms-auto">就绪</span>
        </div>

        <!-- 采集状态面板 -->
        <div id="crawlStatusPanel" class="alert alert-info d-none crawl-status-bar" role="alert">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <i id="crawlIcon" class="bi bi-hourglass-split me-2"></i>
                    <strong>采集状态：</strong><span id="crawlStatusText">准备中...</span>
                </div>
                <button class="btn btn-sm btn-outline-secondary" onclick="closeCrawlStatus()">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="progress mt-2" style="height: 4px;">
                <div id="loginConfirmBtn" class="d-none text-center mt-2">
                    <button class="btn btn-success btn-sm" onclick="confirmLogin(currentCrawlTaskUuid)">
                        <i class="bi bi-check-lg"></i> 确认登录完成，开始采集
                    </button>
                </div>
                <div id="crawlProgressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                    style="width: 100%"></div>
            </div>
            <small id="crawlStatusDetail" class="text-muted mt-1 d-block"></small>
        </div>

        <!-- 竞品列表 -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>竞品名称</th>
                                <th>板块</th>
                                <th>平台</th>
                                <th>关键词</th>
                                <th>间隔</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="competitorTableBody">
                            <tr>
                                <td colspan="8" class="text-center text-muted py-4">
                                    <div class="spinner-border spinner-border-sm me-2"></div>加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑弹窗 -->
    <div class="modal fade" id="competitorModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增竞品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">竞品名称 *</label>
                            <input type="text" class="form-control" id="compName" placeholder="例如：ANKER 充电器">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">板块 *</label>
                            <select class="form-select" id="region" onchange="onRegionChange()">
                                <option value="domestic">国内</option>
                                <option value="international">国际</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">平台 *</label>
                            <select class="form-select" id="platform" onchange="onPlatformChange()">
                                <option value="amazon">Amazon</option>
                                <option value="walmart">Walmart</option>
                                <option value="shopee">Shopee</option>
                                <option value="taobao">淘宝</option>
                                <option value="jd">京东</option>
                                <option value="pdd">拼多多</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">关键词（JSON数组）</label>
                            <input type="text" class="form-control" id="keywords" placeholder='["关键词1", "关键词2"]'>
                        </div>
                        <div class="col-md-6" id="asinGroup">
                            <label class="form-label">ASIN 列表（Amazon专用）</label>
                            <input type="text" class="form-control" id="asinList" placeholder='["B0XXXXXXX"]'>
                            <small class="text-muted">直接按商品ID采集，跳过搜索步骤</small>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">采集间隔（小时）</label>
                            <input type="number" class="form-control" id="crawlInterval" value="24" min="1" max="720">
                        </div>
                        <div class="col-md-3" id="marketplaceGroup" style="display:none">
                            <label class="form-label">站点</label>
                            <select class="form-select" id="marketplace">
                                <option value="amazon.com">amazon.com</option>
                                <option value="amazon.co.uk">amazon.co.uk</option>
                                <option value="amazon.de">amazon.de</option>
                                <option value="amazon.co.jp">amazon.co.jp</option>
                            </select>
                        </div>
                    </div>
                    <div class=col-md-6>
                        <label class=form-label>每次采集条数</label>
                        <input type=number class=form-control id=maxResults value=50 min=1 max=500 placeholder=默认50条>

                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveCompetitor()" id="saveBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/competitor/api/competitor';
        loadCompetitors();

        // ============================================================
        // 数据加载
        // ============================================================
        async function loadCompetitors() {
            const region = document.getElementById('regionFilter').value;
            const platform = document.getElementById('platformFilter').value;
            let url = `${API_BASE}/list?`;
            if (region) url += `region=${region}&`;
            if (platform) url += `platform=${platform}&`;

            try {
                const resp = await fetch(url);
                const json = await resp.json();
                if (!json.success) throw new Error(json.error);

                const tbody = document.getElementById('competitorTableBody');
                if (!json.data || json.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暂无竞品配置，点击"新增竞品"开始</td></tr>';
                    return;
                }
                tbody.innerHTML = json.data.map(renderCompetitorRow).join('');
            } catch (err) {
                setStatus('danger', '加载失败: ' + err.message);
            }
        }

        function renderCompetitorRow(item) {
            const regionBadge = item.region === 'international'
                ? '<span class="badge bg-info platform-badge">国际</span>'
                : '<span class="badge bg-warning text-dark platform-badge">国内</span>';
            const statusBadge = item.status === 1
                ? '<span class="badge bg-success">启用</span>'
                : '<span class="badge bg-secondary">停用</span>';
            const platformMap = { amazon: 'Amazon', walmart: 'Walmart', shopee: 'Shopee', taobao: '淘宝', jd: '京东', pdd: '拼多多' };
            let kwDisplay = '';
            try { kwDisplay = JSON.parse(item.keywords || '[]').slice(0, 3).join(', '); } catch (e) { kwDisplay = item.keywords || ''; }

            return `<tr>
            <td>${item.id}</td>
            <td><strong>${escapeHtml(item.competitor_name)}</strong></td>
            <td>${regionBadge}</td>
            <td><span class="badge bg-dark platform-badge">${platformMap[item.platform] || item.platform}</span></td>
            <td><small>${escapeHtml(kwDisplay)}</small></td>
            <td>${item.crawl_interval_hours || 24}h<br><small class='text-muted'>${item.max_results || 50}?</small></td>
            <td>${statusBadge}</td>
            <td>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-success" title="立即采集"
                            onclick="triggerCrawl(${item.id})">
                        <i class="bi bi-play-fill"></i>
                    </button>
                    <button class="btn btn-outline-primary" title="编辑"
                            onclick="showEditModal(${item.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-warning" title="切换状态"
                            onclick="toggleStatus(${item.id})">
                        <i class="bi bi-power"></i>
                    </button>
                    <button class="btn btn-outline-danger" title="删除"
                            onclick="deleteCompetitor(${item.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </td>
        </tr>`;
        }

        // ============================================================
        // 弹窗
        // ============================================================
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '新增竞品';
            document.getElementById('editId').value = '';
            document.getElementById('compName').value = '';
            document.getElementById('keywords').value = '';
            document.getElementById('asinList').value = '';
            document.getElementById('crawlInterval').value = '24';
            document.getElementById('maxResults').value = '50';
            document.getElementById('region').value = 'domestic';
            document.getElementById('platform').value = 'taobao';
            document.getElementById('saveBtn').textContent = '创建';
            onRegionChange();
            new bootstrap.Modal('#competitorModal').show();
        }

        async function showEditModal(id) {
            try {
                const resp = await fetch(`${API_BASE}/get?id=${id}`);
                const json = await resp.json();
                if (!json.success) throw new Error(json.error);
                const item = json.data;

                document.getElementById('modalTitle').textContent = '编辑竞品';
                document.getElementById('editId').value = item.id;
                document.getElementById('compName').value = item.competitor_name || '';
                document.getElementById('keywords').value = item.keywords || '';
                document.getElementById('asinList').value = item.asin_list || '';
                document.getElementById('crawlInterval').value = item.crawl_interval_hours || 24;
                document.getElementById('maxResults').value = item.max_results || 50;
                document.getElementById('region').value = item.region || 'domestic';
                document.getElementById('platform').value = item.platform || 'amazon';
                document.getElementById('marketplace').value = item.marketplace || 'amazon.com';
                document.getElementById('saveBtn').textContent = '更新';
                onRegionChange();
                new bootstrap.Modal('#competitorModal').show();
            } catch (err) {
                setStatus('danger', '加载失败: ' + err.message);
            }
        }

        async function saveCompetitor() {
            const id = document.getElementById('editId').value;
            const data = {
                competitor_name: document.getElementById('compName').value.trim(),
                keywords: document.getElementById('keywords').value.trim() || '[]',
                asin_list: document.getElementById('asinList').value.trim() || '[]',
                region: document.getElementById('region').value,
                platform: document.getElementById('platform').value,
                marketplace: document.getElementById('marketplace')?.value || 'amazon.com',
                crawl_interval_hours: parseInt(document.getElementById('crawlInterval').value) || 24,
                max_results: parseInt(document.getElementById('maxResults').value) || 50,
                status: 1,
            };
            if (!data.competitor_name) { alert('请输入竞品名称'); return; }

            const url = id ? `${API_BASE}/update?id=${id}` : `${API_BASE}/create`;
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const json = await resp.json();
                if (!json.success) throw new Error(json.error);
                bootstrap.Modal.getInstance('#competitorModal').hide();
                setStatus('success', id ? '已更新' : '已创建');
                loadCompetitors();
            } catch (err) {
                setStatus('danger', '保存失败: ' + err.message);
            }
        }

        // ============================================================
        // 操作
        // ============================================================
        async function toggleStatus(id) {
            try {
                const resp = await fetch(`${API_BASE}/toggle?id=${id}`, { method: 'POST' });
                const json = await resp.json();
                if (!json.success) throw new Error(json.error);
                setStatus('success', '已切换');
                loadCompetitors();
            } catch (err) {
                setStatus('danger', '切换失败: ' + err.message);
            }
        }

        async function deleteCompetitor(id) {
            if (!confirm('确认删除此竞品？')) return;
            try {
                const resp = await fetch(`${API_BASE}/delete?id=${id}`, { method: 'POST' });
                const json = await resp.json();
                if (!json.success) throw new Error(json.error);
                setStatus('success', '已删除');
                loadCompetitors();
            } catch (err) {
                setStatus('danger', '删除失败: ' + err.message);
            }
        }

        // ============================================================
        // 采集 + 实时状态 + 登录等待
        // ============================================================
        let crawlPollTimer = null;
        let currentCrawlTaskUuid = null;

        async function triggerCrawl(id) {
            const headless = document.getElementById('headlessSwitch').checked;
            const panel = document.getElementById('crawlStatusPanel');
            const textEl = document.getElementById('crawlStatusText');
            const detailEl = document.getElementById('crawlStatusDetail');
            const barEl = document.getElementById('crawlProgressBar');
            const iconEl = document.getElementById('crawlIcon');

            panel.classList.remove('d-none');
            panel.className = 'alert alert-info mb-3 crawl-status-bar';
            iconEl.className = 'bi bi-hourglass-split me-2';
            textEl.textContent = '正在下发采集任务...';
            detailEl.textContent = '';
            barEl.className = 'progress-bar progress-bar-striped progress-bar-animated';
            barEl.style.width = '100%';
            setStatus('info', '下发中...');

            try {
                const maxResults = document.getElementById('maxResults')?.value || 50;
                const url = `${API_BASE}/crawl?id=${id}&headless=${headless}&max_results=${maxResults}`;
                const resp = await fetch(url, { method: 'POST' });
                const json = await resp.json();
                if (!json.success) throw new Error(json.error || '下发失败');

                const taskUuid = json.data?.task_uuid;
                currentCrawlTaskUuid = taskUuid;
                const modeText = headless ? '无头模式' : '有头模式';
                setStatus('info', `任务已下发 (${modeText})，采集中...`);
                textEl.textContent = `启动浏览器 (${modeText})...`;
                detailEl.textContent = `任务ID: ${taskUuid}`;

                let pollCount = 0;
                const maxPolls = 60; // 最长2分钟 (30s登录 + 缓冲)

                if (crawlPollTimer) clearInterval(crawlPollTimer);
                crawlPollTimer = setInterval(async () => {
                    pollCount++;
                    try {
                        const sr = await fetch(`${API_BASE}/crawl_status?task_uuid=${taskUuid}`);
                        const sj = await sr.json();
                        if (!sj.success || !sj.data) return;

                        const st = sj.data;
                        textEl.textContent = st.detail || st.status;
                        detailEl.textContent = `任务ID: ${taskUuid} | ${st.updated_at || ''}`;
                        barEl.style.width = '100%';

                        // ---- 登录等待中 ----
                        // ---- 登录等待中 ----
                        if (st.status === 'waiting_login') {
                            panel.className = 'alert alert-warning mb-3 crawl-status-bar';
                            iconEl.className = 'bi bi-person-check me-2';
                            barEl.className = 'progress-bar bg-warning progress-bar-striped progress-bar-animated';
                            // Extract remaining time from detail
                            var match = (st.detail || '').match(/剩余\s*(\d+)s/);
                            if (match) {
                                textEl.innerHTML = '\u270B <strong>等待登录中...</strong>请扫码或输入账号密码 (剩余 <span style="color:red;font-size:1.1em">' + match[1] + 's</span>)';
                                barEl.style.width = Math.min(100, (parseInt(match[1]) / 30) * 100) + '%';
                            } else {
                                textEl.innerHTML = '\u270B <strong>等待登录中...</strong>请完成登录后继续';
                            }
                            setStatus('warning', '等待登录中...请完成登录后继续');
                            return;
                        }

                        // ---- 登录完成，显示确认按钮 ----
                        if (st.status === 'login_done') {
                            panel.className = 'alert alert-success mb-3 crawl-status-bar';
                            iconEl.className = 'bi bi-check-circle me-2';
                            textEl.innerHTML = '<strong>已检测到登录成功！</strong>请点击确认按钮继续';
                            barEl.className = 'progress-bar bg-success';
                            barEl.style.width = '100%';
                            var confirmBtn = document.getElementById('loginConfirmBtn');
                            if (confirmBtn) confirmBtn.classList.remove('d-none');
                            setStatus('success', '请确认登录完成后继续');
                            return;
                        }

                        // ---- 登录超时 ----
                        if (st.status === 'login_timeout') {
                            panel.className = 'alert alert-danger mb-3 crawl-status-bar';
                            iconEl.className = 'bi bi-clock-history me-2';
                            textEl.textContent = '登录超时（30s），已跳过本次采集';
                            barEl.className = 'progress-bar bg-danger';
                            setStatus('danger', '登录超时，已跳过');
                            clearInterval(crawlPollTimer);
                            crawlPollTimer = null;
                            var cb = document.getElementById('loginConfirmBtn'); if (cb) cb.classList.add('d-none');
                            setTimeout(() => loadCompetitors(), 500);
                            return;
                        }

                        // ---- 验证码 ----
                        if (st.status === 'bot_captcha') {
                            panel.className = 'alert alert-warning mb-3 crawl-status-bar';
                            iconEl.className = 'bi bi-shield-exclamation me-2';
                            textEl.innerHTML = '<strong>检测到验证码！</strong>建议勾选"有头模式"后重新采集';
                            barEl.className = 'progress-bar bg-warning';
                            setStatus('warning', '验证码 - 需人工处理');
                            clearInterval(crawlPollTimer);
                            crawlPollTimer = null;
                            return;
                        }

                        // ---- 采集完成 ----
                        if (['completed', 'completed_with_errors'].includes(st.status)) {
                            panel.className = 'alert alert-success mb-3 crawl-status-bar';
                            iconEl.className = 'bi bi-check-circle-fill me-2';
                            textEl.textContent = '采集完成: ' + (st.detail || '');
                            barEl.className = 'progress-bar bg-success';
                            barEl.style.width = '100%';
                            setStatus('success', '采集完成');
                            clearInterval(crawlPollTimer);
                            crawlPollTimer = null;
                            var cb = document.getElementById('loginConfirmBtn'); if (cb) cb.classList.add('d-none');
                            setTimeout(() => loadCompetitors(), 500);
                            return;
                        }
                    } catch (e) { /* 轮询异常，忽略 */ }

                    if (pollCount >= maxPolls) {
                        panel.className = 'alert alert-secondary mb-3 crawl-status-bar';
                        iconEl.className = 'bi bi-clock-history me-2';
                        textEl.textContent = '采集超时（超过6分钟），请检查 Worker 日志';
                        barEl.className = 'progress-bar bg-secondary';
                        setStatus('secondary', '采集超时');
                        clearInterval(crawlPollTimer);
                        var cb = document.getElementById('loginConfirmBtn'); if (cb) cb.classList.add('d-none');
                        crawlPollTimer = null;
                    }
                }, 2000);

            } catch (err) {
                panel.className = 'alert alert-danger mb-3 crawl-status-bar';
                iconEl.className = 'bi bi-x-circle-fill me-2';
                textEl.textContent = '下发失败: ' + err.message;
                barEl.className = 'progress-bar bg-danger';
                setStatus('danger', '下发失败: ' + err.message);
                var cb = document.getElementById('loginConfirmBtn'); if (cb) cb.classList.add('d-none');
            }
        }

        async function confirmLogin(taskUuid) {
            if (!taskUuid) return;
            try {
                await fetch(`${API_BASE}/login_confirm?task_uuid=${taskUuid}`, { method: 'POST' });
                document.getElementById('crawlStatusText').textContent = '已确认，继续采集...';
                var cb = document.getElementById('loginConfirmBtn'); if (cb) cb.classList.add('d-none');
            } catch (e) {
                console.error('Confirm failed:', e);
            }
        }

        function closeCrawlStatus() {
            document.getElementById('crawlStatusPanel').classList.add('d-none');
            var cb = document.getElementById('loginConfirmBtn'); if (cb) cb.classList.add('d-none');
            if (crawlPollTimer) { clearInterval(crawlPollTimer); crawlPollTimer = null; }
        }

        // ============================================================
        // UI 辅助
        // ============================================================
        function onRegionChange() {
            const region = document.getElementById('region').value;
            const platformSelect = document.getElementById('platform');
            if (region === 'international') {
                platformSelect.value = 'amazon';
                Array.from(platformSelect.options).forEach(opt => {
                    opt.hidden = ['taobao', 'jd', 'pdd'].includes(opt.value);
                });
            } else {
                platformSelect.value = 'taobao';
                Array.from(platformSelect.options).forEach(opt => {
                    opt.hidden = ['amazon', 'walmart', 'shopee'].includes(opt.value);
                });
            }
            onPlatformChange();
        }

        function onPlatformChange() {
            const platform = document.getElementById('platform').value;
            document.getElementById('marketplaceGroup').style.display = (platform === 'amazon') ? '' : 'none';
            document.getElementById('asinGroup').style.display = (platform === 'amazon') ? '' : 'none';
        }

        function setStatus(type, msg) {
            const badge = document.getElementById('statusBadge');
            badge.className = `badge bg-${type}`;
            badge.textContent = msg;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>

</html>
