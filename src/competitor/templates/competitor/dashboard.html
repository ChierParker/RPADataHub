<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞价看板 — CompetitorWatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"
                style="border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:4px 12px;font-size:13px;"><i
                    class="bi bi-house-door me-1"></i>首页</a>
            <span class="navbar-brand ms-3" style="font-weight:700;letter-spacing:-0.3px;"><i
                    class="bi bi-eye me-1"></i>CompetitorWatch</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/competitor/manage">竞品管理</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/competitor/dashboard">竞价看板</a></li>
                    <li class="nav-item"><a class="nav-link" href="/competitor/reports">AI 报告</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <h4><i class="bi bi-graph-up"></i> 竞价看板</h4>

        <!-- 筛选栏 -->
        <div class="card mb-3">
            <div class="card-body py-2">
                <div class="row g-2 align-items-center">
                    <div class="col-auto">
                        <label class="form-label mb-0 small">选择竞品</label>
                        <select id="competitorSelect" class="form-select form-select-sm" style="width:220px;"
                            onchange="loadDashboard()">
                            <option value="">-- 请选择竞品 --</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <label class="form-label mb-0 small">时间范围</label>
                        <select id="daysSelect" class="form-select form-select-sm" onchange="loadDashboard()">
                            <option value="7">最近7天</option>
                            <option value="14">最近14天</option>
                            <option value="30" selected>最近30天</option>
                            <option value="60">最近60天</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-sm btn-outline-secondary" onclick="loadDashboard()">
                            <i class="bi bi-arrow-repeat"></i> 刷新
                        </button>
                    </div>
                    <div class="col-auto ms-auto">
                        <span id="updateTime" class="text-muted small"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 概览卡片 -->
        <div class="row g-3 mb-3" id="summaryCards">
            <div class="col-md-3">
                <div class="card border-primary">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted">当前价格</h6>
                        <h3 class="text-primary mb-0" id="currentPrice">--</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-success">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted">30日最低价</h6>
                        <h3 class="text-success mb-0" id="minPrice30">--</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-warning">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted">价格波动率</h6>
                        <h3 class="text-warning mb-0" id="volatility">--</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-info">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted">广告位发生率</h6>
                        <h3 class="text-info mb-0" id="adRate">--</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表行 -->
        <div class="row g-3">
            <!-- 价格趋势图 -->
            <div class="col-md-8">
                <div class="card h-100">
                    <div class="card-header">
                        <i class="bi bi-currency-dollar"></i> 价格趋势
                    </div>
                    <div class="card-body">
                        <canvas id="priceChart" height="280"></canvas>
                    </div>
                </div>
            </div>
            <!-- 排名趋势图 -->
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-header">
                        <i class="bi bi-trophy"></i> 排名变化
                    </div>
                    <div class="card-body">
                        <canvas id="rankChart" height="280"></canvas>
                    </div>
                </div>
            </div>
            <!-- 广告位占比 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-megaphone"></i> 广告位 vs 自然位
                    </div>
                    <div class="card-body">
                        <canvas id="adPieChart" height="220"></canvas>
                    </div>
                </div>
            </div>
            <!-- 最近快照明细 -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-list-ul"></i> 最近采集快照
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                            <table class="table table-sm table-hover mb-0">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>时间</th>
                                        <th>商品</th>
                                        <th>价格</th>
                                        <th>排名</th>
                                        <th>广告</th>
                                        <th>评分</th>
                                    </tr>
                                </thead>
                                <tbody id="snapshotTableBody">
                                    <tr>
                                        <td colspan="6" class="text-center text-muted">请先选择竞品</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/competitor/api/competitor';
        let priceChart = null;
        let rankChart = null;
        let adPieChart = null;

        // ============================================================
        // 初始化
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            loadCompetitorOptions();
        });

        async function loadCompetitorOptions() {
            try {
                const resp = await fetch(`${API_BASE}/list?`);
                const json = await resp.json();
                if (json.success && json.data) {
                    const select = document.getElementById('competitorSelect');
                    json.data.forEach(item => {
                        const opt = document.createElement('option');
                        opt.value = item.id;
                        opt.textContent = `[${item.platform}] ${item.competitor_name}`;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error('加载竞品列表失败:', err);
            }
        }

        // ============================================================
        // 加载看板数据
        // ============================================================
        async function loadDashboard() {
            const competitorId = document.getElementById('competitorSelect').value;
            const days = document.getElementById('daysSelect').value;

            if (!competitorId) {
                resetDashboard();
                return;
            }

            showLoading();

            try {
                // 并行加载趋势和快照
                const [trendResp, snapshotResp] = await Promise.all([
                    fetch(`${API_BASE}/trend?id=${competitorId}&days=${days}`),
                    fetch(`${API_BASE}/snapshots?id=${competitorId}&limit=30`),
                ]);

                const trendJson = await trendResp.json();
                const snapshotJson = await snapshotResp.json();

                if (trendJson.success) {
                    updateSummaryCards(trendJson.data);
                    renderPriceChart(trendJson.data);
                    renderRankChart(trendJson.data);
                    renderAdPieChart(trendJson.data);
                }

                if (snapshotJson.success) {
                    renderSnapshotTable(snapshotJson.data);
                }

                document.getElementById('updateTime').textContent =
                    '更新于 ' + new Date().toLocaleTimeString('zh-CN');

            } catch (err) {
                console.error('加载看板失败:', err);
                resetDashboard();
            }
        }

        // ============================================================
        // 概览卡片
        // ============================================================
        function updateSummaryCards(trendData) {
            if (!trendData || trendData.length === 0) {
                document.getElementById('currentPrice').textContent = '无数据';
                document.getElementById('minPrice30').textContent = '无数据';
                document.getElementById('volatility').textContent = '无数据';
                document.getElementById('adRate').textContent = '无数据';
                return;
            }

            const latest = trendData[trendData.length - 1];
            const minPrice = Math.min(...trendData.map(d => d.min_price || 999999));
            const avgVolatility = trendData.reduce((sum, d) =>
                sum + parseFloat(d.price_volatility || 0), 0) / trendData.length;
            const totalAds = trendData.reduce((sum, d) => sum + (d.ad_count || 0), 0);
            const totalSnapshots = trendData.reduce((sum, d) => sum + (d.snapshot_count || 0), 0);

            document.getElementById('currentPrice').textContent =
                latest.avg_price ? `$${parseFloat(latest.avg_price).toFixed(2)}` : '--';
            document.getElementById('minPrice30').textContent =
                minPrice < 999999 ? `$${parseFloat(minPrice).toFixed(2)}` : '--';
            document.getElementById('volatility').textContent =
                (avgVolatility * 100).toFixed(2) + '%';
            document.getElementById('adRate').textContent =
                totalSnapshots > 0 ? (totalAds / totalSnapshots * 100).toFixed(1) + '%' : '--';
        }

        // ============================================================
        // 价格趋势图
        // ============================================================
        function renderPriceChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (priceChart) priceChart.destroy();

            const labels = data.map(d => d.snapshot_date);
            const minPrices = data.map(d => parseFloat(d.min_price));
            const maxPrices = data.map(d => parseFloat(d.max_price));
            const avgPrices = data.map(d => parseFloat(d.avg_price));

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '最高价',
                            data: maxPrices,
                            borderColor: 'rgba(220, 53, 69, 0.6)',
                            backgroundColor: 'transparent',
                            borderDash: [5, 3],
                            tension: 0.3,
                            pointRadius: 0,
                        },
                        {
                            label: '均价',
                            data: avgPrices,
                            borderColor: 'rgba(13, 110, 253, 1)',
                            backgroundColor: 'rgba(13, 110, 253, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                        },
                        {
                            label: '最低价',
                            data: minPrices,
                            borderColor: 'rgba(25, 135, 84, 0.6)',
                            backgroundColor: 'transparent',
                            borderDash: [5, 3],
                            tension: 0.3,
                            pointRadius: 0,
                        },
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: $${parseFloat(ctx.raw).toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        y: {
                            title: { display: true, text: '价格 (USD)' },
                            ticks: { callback: v => '$' + v }
                        },
                        x: { title: { display: true, text: '日期' } }
                    }
                }
            });
        }

        // ============================================================
        // 排名趋势图
        // ============================================================
        function renderRankChart(data) {
            const ctx = document.getElementById('rankChart').getContext('2d');
            if (rankChart) rankChart.destroy();

            const labels = data.map(d => d.snapshot_date);
            const avgRanks = data.map(d => parseFloat(d.avg_rank));

            rankChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '平均排名',
                        data: avgRanks,
                        borderColor: 'rgba(255, 152, 0, 1)',
                        backgroundColor: 'rgba(255, 152, 0, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                    },
                    scales: {
                        y: {
                            reverse: true,  // 排名越小越好
                            title: { display: true, text: '排名' },
                            min: 1,
                        },
                        x: { title: { display: true, text: '日期' } }
                    }
                }
            });
        }

        // ============================================================
        // 广告位饼图
        // ============================================================
        function renderAdPieChart(data) {
            const ctx = document.getElementById('adPieChart').getContext('2d');
            if (adPieChart) adPieChart.destroy();

            const totalAds = data.reduce((sum, d) => sum + (d.ad_count || 0), 0);
            const totalSnapshots = data.reduce((sum, d) => sum + (d.snapshot_count || 0), 0);
            const organic = totalSnapshots - totalAds;

            adPieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['广告位', '自然位'],
                    datasets: [{
                        data: [totalAds, Math.max(organic, 0)],
                        backgroundColor: [
                            'rgba(255, 152, 0, 0.7)',
                            'rgba(25, 135, 84, 0.7)',
                        ],
                        borderColor: '#fff',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                    }
                }
            });
        }

        // ============================================================
        // 快照明细表
        // ============================================================
        function renderSnapshotTable(snapshots) {
            const tbody = document.getElementById('snapshotTableBody');
            if (!snapshots || snapshots.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">无快照数据</td></tr>';
                return;
            }

            tbody.innerHTML = snapshots.slice(0, 20).map(s => `
            <tr>
                <td class="small">${s.snapshot_time || '-'}</td>
                <td class="small">${escapeHtml((s.title || '-').substring(0, 50))}</td>
                <td>
                    ${s.current_price ? '<strong>$' + parseFloat(s.current_price).toFixed(2) + '</strong>' : '-'}
                    ${s.original_price && s.original_price > s.current_price
                    ? ' <small class="text-decoration-line-through text-muted">$' + parseFloat(s.original_price).toFixed(2) + '</small>'
                    : ''}
                </td>
                <td>${s.rank_position || '-'}</td>
                <td>${s.is_ad ? '<span class="badge bg-warning text-dark">广告</span>' : '<span class="badge bg-light text-dark">自然</span>'}</td>
                <td>${s.rating ? '★ ' + parseFloat(s.rating).toFixed(1) : '-'}</td>
            </tr>
        `).join('');
        }

        // ============================================================
        // 辅助
        // ============================================================
        function resetDashboard() {
            document.getElementById('currentPrice').textContent = '--';
            document.getElementById('minPrice30').textContent = '--';
            document.getElementById('volatility').textContent = '--';
            document.getElementById('adRate').textContent = '--';
            document.getElementById('snapshotTableBody').innerHTML =
                '<tr><td colspan="6" class="text-center text-muted">请先选择竞品</td></tr>';
            if (priceChart) { priceChart.destroy(); priceChart = null; }
            if (rankChart) { rankChart.destroy(); rankChart = null; }
            if (adPieChart) { adPieChart.destroy(); adPieChart = null; }
        }

        function showLoading() {
            ['currentPrice', 'minPrice30', 'volatility', 'adRate'].forEach(id => {
                document.getElementById(id).textContent = '...';
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>

</html>
