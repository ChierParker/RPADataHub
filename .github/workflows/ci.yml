name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: data
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest DBUtils

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/rpa/core/ src/rpa/routes/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: |
          cd src/rpa
          python -m pytest tests/ -v --tb=short
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: test123
          DB_NAME: data

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ecomiq-rpa .
